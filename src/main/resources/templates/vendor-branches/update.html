<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Update Vendor Branch</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="app-header"><div class="logo-line"><div class="logo-coin">🪙</div><h1>Update Vendor Branch</h1></div><p class="subtle">Modify branch quantity</p></header>
<main class="page-shell">
    <div class="topbar"><span class="member-pill">Member: <b th:text="${member}"></b></span><a class="btn btn-secondary" th:href="@{/vendor-branches(member=${member})}">← Back</a></div>
    <section class="panel">
        <div th:if="${errorMessage}" class="alert"><p th:text="${errorMessage}"></p></div>
        <form class="form-grid" th:action="@{'/vendor-branches/update/' + ${branch['branchId']}}" method="post">
            <input type="hidden" name="member" th:value="${member}" />
            <div class="form-group"><label>Branch ID</label><input type="text" th:value="${branch['branchId']}" readonly></div>
            <div class="form-group"><label>Vendor Name</label><input type="text" th:value="${branch['vendorName']}" readonly></div>
            <div class="form-group"><label>Address</label><input type="text" th:value="${branch['addressText']}" readonly></div>
            <div class="form-group"><label>Quantity</label><input type="number" step="0.01" name="quantity" th:value="${branch['quantity']}" required></div>
            <div class="actions"><button type="submit">Update Branch</button><a class="btn btn-secondary" th:href="@{/vendor-branches(member=${member})}">Cancel</a></div>
        </form>
    </section>
</main>
</body>
</html>
